{% extends "base.html" %}

{% block title %}家庭聊天 - 家庭智能监控系统{% endblock %}

{% block extra_css %}
<link href="{{ url_for('static', filename='css/chat.css') }}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="chat-layout">
    <div class="chat-sidebar" id="chatSidebar">
        <div class="chat-sidebar-header">
            <h5 class="d-flex align-items-center mb-0"><i class="fas fa-comments me-2" style="color: #07c160;"></i>聊天</h5>
            <button class="btn btn-sm btn-outline-primary" onclick="showNewChatModal()" title="新建聊天">
                <i class="fas fa-plus"></i>
            </button>
        </div>
        <div class="chat-search">
            <input type="text" id="roomSearch" placeholder="搜索聊天..." oninput="filterRooms()">
        </div>
        <div class="room-list" id="roomList"></div>
    </div>
    <div class="chat-resizer" id="chatResizer"></div>
    <div class="chat-main" id="chatMain">
        <div class="chat-empty" id="chatEmpty">
            <div>
                <i class="fas fa-comments"></i>
                <div>选择一个聊天开始对话</div>
            </div>
        </div>
        <div id="chatActive" style="display:none; flex-direction:column; height:100%; overflow: hidden;">
            <div class="chat-header" id="chatHeader">
                <button class="btn btn-sm btn-link d-md-none" onclick="showSidebar()" style="color: var(--text-main);">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="d-flex align-items-center gap-2">
                    <span class="chat-header-name" id="chatName"></span>
                    <span class="chat-header-status" id="chatStatus"></span>
                </div>
            </div>
            
            <div id="groupMembersSection" class="group-members-section" style="display:none; padding:10px 20px; border-bottom:1px solid var(--border-color); background:var(--card-bg);">
                <div class="group-members-header" onclick="toggleGroupMembers()">
                    <span>群成员 <span id="memberCount"></span></span>
                    <i class="fas fa-chevron-down" id="memberChevron"></i>
                </div>
                <div class="group-members-list" id="groupMembersList" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;"></div>
            </div>

            <div class="chat-messages" id="chatMessages" style="flex: 1; overflow-y: auto;"></div>
            <div class="chat-resizer-y" id="chatResizerY"></div>
            <div class="chat-input-area" id="chatInputArea" style="flex-shrink: 0;">
                <div class="chat-toolbar">
                    <i class="fas fa-smile" title="表情"></i>
                    <i class="fas fa-cube" title="功能"></i>
                    <i class="fas fa-folder" title="文件"></i>
                    <i class="fas fa-scissors" title="截图"></i>
                    <i class="fas fa-microphone" title="语音"></i>
                </div>
                <div id="msgInput" contenteditable="true" placeholder="输入消息..." onkeydown="handleInputKey(event)" oninput="updateSendButtonState()"></div>
                <div class="chat-actions">
                    <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>发送(S)</button>
                </div>
            </div>
            <div class="image-preview-bar" id="imagePreviewBar" style="display:none;">
                <div class="image-preview-thumb">
                    <img id="imagePreviewThumb" src="" onload="updateSendButtonState()">
                    <button class="image-preview-remove" onclick="cancelImagePreview(); updateSendButtonState();"><i class="fas fa-times"></i></button>
                </div>
                <span class="image-preview-name" id="imagePreviewName"></span>
            </div>
        </div>
    </div>
</div>

<div class="modal fade new-chat-modal" id="memberModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title"><i class="fas fa-users me-2" style="color: #07c160;"></i>群成员</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0" id="memberListBody">
                <div class="text-center text-muted py-4">加载中...</div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade new-chat-modal" id="newChatModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title"><i class="fas fa-user-plus me-2" style="color: #07c160;"></i>新建聊天</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0" id="userListBody">
                <div class="text-center text-muted py-4">加载中...</div>
            </div>
        </div>
    </div>
</div>

<div class="msg-image-viewer" id="imageViewer" style="display:none;" onclick="this.style.display='none'">
    <img id="imageViewerImg" src="">
</div>

{% endblock %}

{% block extra_js %}
<script>
    const currentUserId = {{ current_user.id }};
</script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
