{% extends "base.html" %}

{% block title %}家庭聊天 - 家庭智能监控系统{% endblock %}

{% block extra_css %}
<style>
.chat-layout {
    display: flex;
    height: calc(100vh - 40px);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border-color);
    background: var(--card-bg);
}

.chat-sidebar {
    width: 300px;
    min-width: 220px;
    max-width: 500px;
    border-right: none;
    display: flex;
    flex-direction: column;
    background: #1a1a1a;
}

.chat-resizer {
    width: 4px;
    cursor: col-resize;
    background: var(--border-color);
    transition: background 0.2s;
    flex-shrink: 0;
    position: relative;
}

.chat-resizer:hover,
.chat-resizer.active {
    background: #07c160;
}

.chat-resizer::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 4px;
    height: 40px;
    border-radius: 2px;
    background: transparent;
}

.chat-resizer:hover::after,
.chat-resizer.active::after {
    background: rgba(7, 193, 96, 0.3);
    border-radius: 2px;
}

[data-theme="light"] .chat-sidebar {
    background: #ededed;
}

.chat-sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    gap: 10px;
}

.chat-sidebar-header h5 {
    margin: 0;
    flex: 1;
    font-size: 1rem;
    font-weight: 600;
}

.chat-sidebar-header .btn-outline-primary {
    border-color: #07c160;
    color: #07c160;
}

.chat-sidebar-header .btn-outline-primary:hover {
    background: #07c160;
    color: #fff;
}

.chat-search {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border-color);
}

.chat-search input {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    color: #fafaf9;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.85rem;
    width: 100%;
}

[data-theme="light"] .chat-search input {
    background: #fff;
    border-color: #d9d9d9;
    color: #333;
}

.chat-search input:focus {
    border-color: #07c160;
    outline: none;
    box-shadow: 0 0 0 2px rgba(7, 193, 96, 0.15);
}

.chat-search input::placeholder {
    color: #888;
}

[data-theme="light"] .chat-search input::placeholder {
    color: #b2b2b2;
}

.room-list {
    flex: 1;
    overflow-y: auto;
}

.room-item {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
}

[data-theme="light"] .room-item {
    border-bottom-color: rgba(0, 0, 0, 0.04);
}

.room-item:hover {
    background: rgba(7, 193, 96, 0.06);
}

.room-item.active {
    background: rgba(7, 193, 96, 0.1);
}

.room-avatar {
    width: 42px;
    height: 42px;
    border-radius: 6px;
    object-fit: cover;
    margin-right: 12px;
    flex-shrink: 0;
}

.room-avatar-placeholder {
    width: 42px;
    height: 42px;
    border-radius: 6px;
    margin-right: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    background: #07c160;
    color: #fff;
}

.room-info {
    flex: 1;
    min-width: 0;
}

.room-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 6px;
}

.room-name .pin-icon {
    color: #07c160;
    font-size: 0.7rem;
}

.online-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #07c160;
    display: inline-block;
}

.room-last-msg {
    font-size: 0.8rem;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
}

[data-theme="light"] .room-last-msg {
    color: #999;
}

.room-meta {
    text-align: right;
    flex-shrink: 0;
    margin-left: 8px;
}

.room-time {
    font-size: 0.7rem;
    color: #666;
}

[data-theme="light"] .room-time {
    color: #b2b2b2;
}

.room-status {
    font-size: 0.7rem;
    margin-left: 6px;
}

.room-status.online {
    color: #07c160;
}

.room-status.offline {
    color: #888;
}

.room-sender {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 2px;
}

.chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #111;
}

[data-theme="light"] .chat-main {
    background: #f5f5f5;
}

.chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-color);
    background: var(--card-bg);
    display: flex;
    align-items: center;
    gap: 10px;
}

.chat-header-name {
    font-weight: 600;
    font-size: 1rem;
}

.chat-header-status {
    font-size: 0.8rem;
    color: #07c160;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.msg-row {
    display: flex;
    gap: 10px;
    max-width: 70%;
}

.msg-row.mine {
    align-self: flex-end;
    flex-direction: row-reverse;
}

.msg-avatar {
    width: 38px;
    height: 38px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
}

.msg-avatar-placeholder {
    width: 38px;
    height: 38px;
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    background: #333;
    color: #999;
}

[data-theme="light"] .msg-avatar-placeholder {
    background: #d9d9d9;
    color: #666;
}

.msg-bubble {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.9rem;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
}

.msg-row:not(.mine) .msg-bubble {
    background: #2a2a2a;
    color: #fafaf9;
    border-top-left-radius: 4px;
}

[data-theme="light"] .msg-row:not(.mine) .msg-bubble {
    background: #fff;
    color: #333;
}

.msg-row.mine .msg-bubble {
    background: #2c6e3d;
    color: #e8f5e9;
    border-top-right-radius: 4px;
}

[data-theme="light"] .msg-row.mine .msg-bubble {
    background: #95ec69;
    color: #1a1a1a;
}

.msg-sender-name {
    font-size: 0.7rem;
    color: #888;
    margin-bottom: 4px;
}

.msg-time {
    font-size: 0.65rem;
    color: #666;
    margin-top: 4px;
    text-align: right;
}

[data-theme="light"] .msg-time {
    color: #b2b2b2;
}

.msg-row:not(.mine) .msg-time {
    text-align: left;
}

.msg-image {
    max-width: 240px;
    max-height: 180px;
    border-radius: 8px;
    cursor: pointer;
    display: block;
    object-fit: contain;
    background: rgba(0,0,0,0.05);
}

.msg-row.mine .msg-image {
    border: 2px solid rgba(255,255,255,0.2);
}

.msg-row:not(.mine) .msg-image {
    border: 2px solid rgba(0,0,0,0.1);
}

.msg-image-viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    cursor: pointer;
}

.msg-image-viewer img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    border-radius: 8px;
}

.msg-context-menu {
    position: fixed;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 10001;
    min-width: 100px;
    overflow: hidden;
}

.msg-context-menu-item {
    padding: 10px 16px;
    font-size: 0.85rem;
    color: var(--text-main);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
}

.msg-context-menu-item:hover {
    background: rgba(251, 146, 60, 0.1);
}

.msg-context-menu-item.danger {
    color: #ef4444;
}

.msg-recalled {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-style: italic;
    padding: 8px 14px;
    text-align: center;
    width: 100%;
}

.chat-input-area {
    padding: 12px 20px;
    border-top: 1px solid var(--border-color);
    background: #1a1a1a;
    display: flex;
    gap: 10px;
    align-items: flex-end;
}

[data-theme="light"] .chat-input-area {
    background: #f7f7f7;
}

.input-toolbar {
    display: flex;
    align-items: flex-end;
    padding-bottom: 10px;
}

.toolbar-btn {
    background: none;
    border: none;
    color: #888;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 6px;
    transition: all 0.2s;
}

.toolbar-btn:hover {
    color: #07c160;
    background: rgba(7, 193, 96, 0.1);
}

.image-preview-bar {
    padding: 8px 20px;
    border-top: 1px solid var(--border-color);
    background: #1a1a1a;
    display: flex;
    align-items: center;
    gap: 10px;
}

[data-theme="light"] .image-preview-bar {
    background: #f7f7f7;
}

.image-preview-thumb {
    position: relative;
    width: 48px;
    height: 48px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
}

.image-preview-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.image-preview-remove {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    font-size: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
}

.image-preview-name {
    font-size: 0.8rem;
    color: #888;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.chat-input-area textarea {
    flex: 1;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    color: #fafaf9;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 0.9rem;
    resize: none;
    max-height: 120px;
    min-height: 42px;
    line-height: 1.4;
}

[data-theme="light"] .chat-input-area textarea {
    background: #fff;
    border-color: #d9d9d9;
    color: #333;
}

.chat-input-area textarea:focus {
    border-color: #07c160;
    outline: none;
    box-shadow: 0 0 0 2px rgba(7, 193, 96, 0.1);
}

.chat-input-area textarea::placeholder {
    color: #666;
}

[data-theme="light"] .chat-input-area textarea::placeholder {
    color: #b2b2b2;
}

.btn-send {
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 24px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
}

.btn-send:hover {
    background: #06ad56;
}

.btn-send:active {
    background: #059a4b;
}

.chat-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-muted);
    font-size: 1rem;
}

.chat-empty i {
    font-size: 3rem;
    margin-bottom: 12px;
    display: block;
    text-align: center;
    opacity: 0.3;
    color: #07c160;
}

.new-chat-modal .modal-content {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
}

.user-list-item {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
}

.user-list-item:hover {
    background: rgba(7, 193, 96, 0.06);
}

.user-list-item img {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    object-fit: cover;
    margin-right: 12px;
}

.user-list-item .user-name {
    flex: 1;
    font-size: 0.9rem;
}

.user-list-item .user-role {
    font-size: 0.75rem;
    color: var(--text-muted);
}

@media (max-width: 768px) {
    .chat-resizer {
        display: none;
    }
    .chat-sidebar {
        position: absolute;
        z-index: 10;
        width: 100% !important;
        min-width: 100% !important;
        max-width: none !important;
        height: 100%;
    }
    .chat-sidebar.hidden {
        display: none;
    }
    .chat-main {
        width: 100%;
    }
    .msg-row {
        max-width: 85%;
    }
}
</style>
{% endblock %}

{% block content %}
<div class="chat-layout">
    <div class="chat-sidebar" id="chatSidebar">
        <div class="chat-sidebar-header">
            <h5><i class="fas fa-comments me-2" style="color: #07c160;"></i>聊天</h5>
            <button class="btn btn-sm btn-outline-primary" onclick="showNewChatModal()" title="新建聊天">
                <i class="fas fa-plus"></i>
            </button>
        </div>
        <div class="chat-search">
            <input type="text" id="roomSearch" placeholder="搜索聊天..." oninput="filterRooms()">
        </div>
        <div class="room-list" id="roomList"></div>
    </div>
    <div class="chat-resizer" id="chatResizer"></div>
    <div class="chat-main" id="chatMain">

            <div>
                <i class="fas fa-comments"></i>
                <div>选择一个聊天开始对话</div>
            </div>
        </div>
        <div id="chatActive" style="display:none; flex-direction:column; height:100%;">
            <div class="chat-header" id="chatHeader">
                <button class="btn btn-sm btn-link d-md-none" onclick="showSidebar()" style="color: var(--text-main);">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <span class="chat-header-name" id="chatName"></span>
                <span class="chat-header-status" id="chatStatus"></span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <div class="input-toolbar">
                    <button class="toolbar-btn" onclick="document.getElementById('chatImageInput').click()" title="发送图片">
                        <i class="fas fa-image"></i>
                    </button>
                    <input type="file" id="chatImageInput" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none;" onchange="handleImageSelect(this)">
                </div>

</div>

<div class="modal fade new-chat-modal" id="newChatModal" tabindex="-1">

                <h6 class="modal-title"><i class="fas fa-user-plus me-2" style="color: #07c160;"></i>新建聊天</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0" id="userListBody">
                <div class="text-center text-muted py-4">加载中...</div>
            </div>
        </div>
    </div>
</div>

<div class="msg-image-viewer" id="imageViewer" style="display:none;" onclick="this.style.display='none'">
    <img id="imageViewerImg" src="">
</div>

{% endblock %}

{% block extra_js %}
<script>
let rooms = [];
let currentRoomId = null;
let currentRoomType = null;
let currentUserId = {{ current_user.id }};

function loadRooms() {
    fetch('/chat/api/rooms')
        .then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        })
        .then(data => {
            rooms = data.rooms;
            renderRoomList();
        })
        .catch(err => {
            console.error('loadRooms error:', err);
            document.getElementById('roomList').innerHTML = '<div class="text-center text-muted py-4">加载失败: ' + err.message + '</div>';
        });
}

function renderRoomList() {
    const container = document.getElementById('roomList');
    const search = (document.getElementById('roomSearch').value || '').toLowerCase();
    let html = '';
    rooms.forEach(room => {
        if (search && !room.name.toLowerCase().includes(search)) return;
        const isActive = room.id === currentRoomId;
        const avatarHtml = room.type === 'group'
            ? `<div class="room-avatar-placeholder"><i class="fas fa-home"></i></div>`
            : (room.other_members.length > 0 && room.other_members[0].avatar
                ? `<img src="/static/${room.other_members[0].avatar}" class="room-avatar">`
                : `<div class="room-avatar-placeholder">${(room.name || '?')[0].toUpperCase()}</div>`);
        const onlineHtml = room.type === 'private' && room.online
            ? `<span class="online-dot"></span>` : '';
        const pinHtml = room.is_pinned ? `<i class="fas fa-thumbtack pin-icon"></i>` : '';
        const statusHtml = room.type === 'private'
            ? `<span class="room-status ${room.online ? 'online' : 'offline'}">${room.online ? '在线' : '离线'}</span>`
            : '';
        html += `
        <div class="room-item ${isActive ? 'active' : ''}" onclick="openRoom(${room.id}, '${room.type}')">
            ${avatarHtml}
            <div class="room-info">
                <div class="room-name">${room.name} ${pinHtml} ${statusHtml}</div>
                <div class="room-last-msg">${room.last_sender ? room.last_sender + ': ' : ''}${room.last_message || '暂无消息'}</div>
            </div>
            <div class="room-meta">
                <div class="room-time">${room.last_time || ''}</div>
            </div>
        </div>`;
    });
    container.innerHTML = html || '<div class="text-center text-muted py-4">暂无聊天</div>';
}

function filterRooms() {
    renderRoomList();
}

function openRoom(roomId, roomType) {
    currentRoomId = roomId;
    currentRoomType = roomType;
    socket.emit('leave_room', {room_id: roomId});
    socket.emit('join_room', {room_id: roomId});
    document.getElementById('chatEmpty').style.display = 'none';
    document.getElementById('chatActive').style.display = 'flex';
    renderRoomList();
    loadMessages(roomId);
    const room = rooms.find(r => r.id === roomId);
    document.getElementById('chatName').textContent = room.name;
    if (roomType === 'private') {
        document.getElementById('chatStatus').innerHTML = room.online
            ? '<span style="color:#10b981;">在线</span>' : '<span style="color:#ef4444;">离线</span>';
    } else {
        document.getElementById('chatStatus').textContent = '群聊';
    }
    if (window.innerWidth <= 768) {
        document.getElementById('chatSidebar').classList.add('hidden');
    }
}

function loadMessages(roomId) {
    fetch(`/chat/api/rooms/${roomId}/messages`)
        .then(r => r.json())
        .then(data => {
            renderMessages(data.messages);
        });
}

function renderMessages(messages) {
    const container = document.getElementById('chatMessages');
    let html = '';
    messages.forEach(msg => {
        const isMine = msg.is_mine;
        const avatarHtml = msg.sender_avatar
            ? `<img src="/static/${msg.sender_avatar}" class="msg-avatar">`
            : `<div class="msg-avatar-placeholder">${(msg.sender_name || '?')[0].toUpperCase()}</div>`;
        let senderHtml = '';
        if (!isMine && currentRoomType === 'group') {
            senderHtml = `<div class="msg-sender-name">${msg.sender_name}</div>`;
        }
        if (msg.is_recalled) {
            html += `
            <div style="text-align:center;padding:8px 0;">
                <span class="msg-recalled">${isMine ? '你' : msg.sender_name}撤回了一条消息</span>
            </div>`;
            return;
        }
        let contentHtml = '';
        if (msg.message_type === 'image') {
            contentHtml = `<img src="/${msg.image_url}" class="msg-image" onclick="viewImage(this.src)">`;
            if (msg.content) {
                contentHtml += `<div style="margin-top:4px;">${escapeHtml(msg.content)}</div>`;
            }
        } else {
            contentHtml = escapeHtml(msg.content);
        }
        const canRecall = isMine && msg.created_at ? (Date.now() - new Date(msg.created_at).getTime() < 120000) : false;
        html += `
        <div class="msg-row ${isMine ? 'mine' : ''}" data-msg-id="${msg.id}" data-msg-time="${msg.created_at || ''}" oncontextmenu="showMsgMenu(event, ${msg.id}, ${isMine})">
            ${avatarHtml}
            <div>
                ${senderHtml}
                <div class="msg-bubble">${contentHtml}</div>
                <div class="msg-time">${msg.time}${canRecall ? ' · <span class="msg-recall-hint" onclick="recallMessage(' + msg.id + ')" style="cursor:pointer;color:#07c160;">撤回</span>' : ''}</div>
            </div>
        </div>`;
    });
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
}

let pendingImageFile = null;
let pendingImageName = '';

function handleImageSelect(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    if (file.size > 10 * 1024 * 1024) {
        showToast('图片大小不能超过 10MB', 'error');
        return;
    }
    pendingImageFile = file;
    pendingImageName = file.name;
    const reader = new FileReader();
    reader.onload = (e) => {
        document.getElementById('imagePreviewThumb').src = e.target.result;
        document.getElementById('imagePreviewName').textContent = file.name;
        document.getElementById('imagePreviewBar').style.display = 'flex';
    };
    reader.readAsDataURL(file);
    input.value = '';
}

function cancelImagePreview() {
    pendingImageFile = null;
    pendingImageName = '';
    document.getElementById('imagePreviewBar').style.display = 'none';
    document.getElementById('imagePreviewThumb').src = '';
    document.getElementById('imagePreviewName').textContent = '';
}

function viewImage(src) {
    document.getElementById('imageViewerImg').src = src;
    document.getElementById('imageViewer').style.display = 'flex';
}

function sendMessage() {
    const input = document.getElementById('msgInput');
    const content = input.value.trim();
    if (!currentRoomId) return;
    if (!content && !pendingImageFile) return;

    if (pendingImageFile) {
        const formData = new FormData();
        formData.append('image', pendingImageFile);
        fetch('/chat/api/upload-image', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            if (data.url) {
                socket.emit('send_message', {
                    room_id: currentRoomId,
                    content: content,
                    image_url: data.url,
                    message_type: 'image'
                });
                cancelImagePreview();
                input.value = '';
                input.style.height = 'auto';
            } else {
                showToast(data.error || '图片上传失败', 'error');
            }
        })
        .catch(() => showToast('图片上传失败', 'error'));
    } else {
        socket.emit('send_message', {room_id: currentRoomId, content: content});
        input.value = '';
        input.style.height = 'auto';
    }
}

function handleInputKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function showNewChatModal() {
    const modal = new bootstrap.Modal(document.getElementById('newChatModal'));
    document.getElementById('userListBody').innerHTML = '<div class="text-center text-muted py-4">加载中...</div>';
    modal.show();
    fetch('/chat/api/users')
        .then(r => r.json())
        .then(data => {
            let html = '';
            data.users.forEach(u => {
                const avatarHtml = u.avatar
                    ? `<img src="/static/${u.avatar}">`
                    : `<div class="room-avatar-placeholder" style="width:36px;height:36px;font-size:0.8rem;margin-right:12px;">${(u.nickname || '?')[0].toUpperCase()}</div>`;
                const roleText = u.role === 'admin' ? '管理员' : u.role === 'assistant' ? '辅助管理员' : '家人';
                html += `
                <div class="user-list-item" onclick="startPrivateChat(${u.id})">
                    ${avatarHtml}
                    <div>
                        <div class="user-name">${u.nickname || u.username} ${u.online ? '<span class="online-dot"></span>' : ''}</div>
                        <div class="user-role">${roleText}</div>
                    </div>
                </div>`;
            });
            document.getElementById('userListBody').innerHTML = html || '<div class="text-center text-muted py-4">暂无可聊天的用户</div>';
        });
}

function startPrivateChat(userId) {
    fetch('/chat/api/rooms/create-private', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_id: userId})
    })
    .then(r => r.json())
    .then(data => {
        bootstrap.Modal.getInstance(document.getElementById('newChatModal')).hide();
        loadRooms();
        setTimeout(() => {
            const room = rooms.find(r => r.id === data.room_id);
            if (room) openRoom(room.id, room.type);
        }, 300);
    });
}

function showSidebar() {
    document.getElementById('chatSidebar').classList.remove('hidden');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showMsgMenu(e, msgId, isMine) {
    e.preventDefault();
    const existing = document.getElementById('msgContextMenu');
    if (existing) existing.remove();
    if (!isMine) return;
    const menu = document.createElement('div');
    menu.id = 'msgContextMenu';
    menu.className = 'msg-context-menu';
    menu.innerHTML = `<div class="msg-context-menu-item danger" onclick="recallMessage(${msgId})"><i class="fas fa-undo"></i>撤回</div>`;
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
    document.body.appendChild(menu);
}

function recallMessage(msgId) {
    const el = document.querySelector(`[data-msg-id="${msgId}"]`);
    if (!el) return;
    fetch(`/chat/api/messages/${msgId}/recall`, { method: 'POST' })
    .then(r => r.json())
    .then(data => {
        if (data.message) {
            showToast('已撤回');
            el.outerHTML = `
            <div style="text-align:center;padding:8px 0;">
                <span class="msg-recalled">你撤回了一条消息</span>
            </div>`;
        } else {
            showToast(data.error || '撤回失败', 'error');
        }
    })
    .catch(() => showToast('撤回失败', 'error'));
}

socket.on('message_recalled', (data) => {
    const el = document.querySelector(`[data-msg-id="${data.msg_id}"]`);
    if (el) {
        const isMine = data.sender_id === currentUserId;
        el.outerHTML = `
        <div style="text-align:center;padding:8px 0;">
            <span class="msg-recalled">${isMine ? '你' : '对方'}撤回了一条消息</span>
        </div>`;
    } else if (data.room_id === currentRoomId) {
        loadMessages(currentRoomId);
    }
    loadRooms();
});

document.addEventListener('click', () => {
    const menu = document.getElementById('msgContextMenu');
    if (menu) menu.remove();
});

socket.on('new_message', (data) => {
    const isMine = data.sender_id === currentUserId;
    if (data.room_id === currentRoomId) {
        const container = document.getElementById('chatMessages');
        const avatarHtml = data.sender_avatar
            ? `<img src="/static/${data.sender_avatar}" class="msg-avatar">`
            : `<div class="msg-avatar-placeholder">${(data.sender_name || '?')[0].toUpperCase()}</div>`;
        let senderHtml = '';
        if (!isMine && currentRoomType === 'group') {
            senderHtml = `<div class="msg-sender-name">${data.sender_name}</div>`;
        }
        let contentHtml = '';
        if (data.message_type === 'image') {
            contentHtml = `<img src="/${data.image_url}" class="msg-image" onclick="viewImage(this.src)">`;
            if (data.content) {
                contentHtml += `<div style="margin-top:4px;">${escapeHtml(data.content)}</div>`;
            }
        } else {
            contentHtml = escapeHtml(data.content);
        }
        const html = `
        <div class="msg-row ${isMine ? 'mine' : ''}">
            ${avatarHtml}
            <div>
                ${senderHtml}
                <div class="msg-bubble">${contentHtml}</div>
                <div class="msg-time">${data.time}</div>
            </div>
        </div>`;
        container.insertAdjacentHTML('beforeend', html);
        container.scrollTop = container.scrollHeight;
    }
    const room = rooms.find(r => r.id === data.room_id);
    if (room) {
        room.last_message = data.message_type === 'image' ? '[图片]' : data.content;
        room.last_time = data.time;
        room.last_sender = data.sender_name;
        renderRoomList();
    }
});

socket.on('online_status', (data) => {
    rooms.forEach(r => {
        if (r.type === 'private' && r.other_members.length > 0) {
            r.other_members.forEach(m => {
                if (m.id === data.user_id) {
                    m.online = data.online;
                    r.online = data.online;
                }
            });
        }
    });
    if (currentRoomType === 'private') {
        const room = rooms.find(r => r.id === currentRoomId);
        if (room) {
            document.getElementById('chatStatus').innerHTML = room.online
                ? '<span style="color:#10b981;">在线</span>' : '<span style="color:#ef4444;">离线</span>';
        }
    }
    renderRoomList();
});

document.addEventListener('DOMContentLoaded', () => {
    loadRooms();
    const familyRoom = rooms.find(r => r.is_pinned);
    if (familyRoom) openRoom(familyRoom.id, familyRoom.type);

    const resizer = document.getElementById('chatResizer');
    const sidebar = document.getElementById('chatSidebar');
    let isResizing = false;
    let startX = 0;
    let startWidth = 0;

    resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        startX = e.clientX;
        startWidth = sidebar.offsetWidth;
        resizer.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const delta = e.clientX - startX;
        const newWidth = Math.min(Math.max(startWidth + delta, 220), 500);
        sidebar.style.width = newWidth + 'px';
    });

    document.addEventListener('mouseup', () => {
        if (isResizing) {
            isResizing = false;
            resizer.classList.remove('active');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        }
    });
});
</script>
{% endblock %}
